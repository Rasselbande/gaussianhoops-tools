<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaussian Hoops – Top Portal Rankings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #ffffff;
    color: #1a2e4a;
    padding: 0;
  }

  .widget {
    width: 100%;
    border: 1px solid #e8edf3;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 16px rgba(26,46,74,0.08);
  }

  /* ── Header ── */
  .widget-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: #1a2e4a;
    color: #fff;
  }
  .widget-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .widget-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .badge-season {
    font-size: 11px;
    font-weight: 600;
    background: rgba(232,160,32,0.25);
    color: #f0b930;
    border: 1px solid rgba(240,185,48,0.4);
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.3px;
  }
  .badge-portal {
    font-size: 10px;
    font-weight: 700;
    background: rgba(76,175,80,0.18);
    color: #66bb6a;
    border: 1px solid rgba(102,187,106,0.35);
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .badge-live {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: rgba(255,255,255,0.6);
  }
  .badge-live::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4caf50;
    box-shadow: 0 0 4px #4caf50;
  }

  /* ── Column headers ── */
  .col-headers {
    display: grid;
    grid-template-columns: 36px 1fr 52px 36px 46px 56px;
    padding: 6px 16px;
    background: #f5f7fa;
    border-bottom: 1px solid #e8edf3;
    gap: 4px;
  }
  .col-headers span {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: #8a9bb0;
    text-align: right;
  }
  .col-headers span:nth-child(1),
  .col-headers span:nth-child(2) {
    text-align: left;
  }

  /* ── Rows ── */
  .player-row {
    display: grid;
    grid-template-columns: 36px 1fr 52px 36px 46px 56px;
    padding: 9px 16px;
    align-items: center;
    border-bottom: 1px solid #f0f3f7;
    gap: 4px;
    transition: background 0.15s;
    cursor: default;
  }
  .player-row:last-child { border-bottom: none; }
  .player-row:hover { background: #f8fafd; }

  /* Rank badge */
  .rank-num {
    font-size: 13px;
    font-weight: 700;
    width: 26px;
    height: 26px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .rank-1 { background: #fff3cd; color: #9a6c00; }
  .rank-2 { background: #f0f0f0; color: #555; }
  .rank-3 { background: #fce8d8; color: #9a4500; }
  .rank-other { background: transparent; color: #8a9bb0; font-size: 12px; }

  /* Player name */
  .player-name {
    font-size: 13px;
    font-weight: 600;
    color: #1a2e4a;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Team */
  .player-team {
    font-size: 11px;
    font-weight: 600;
    color: #1a2e4a;
    text-align: right;
  }

  /* Class badge */
  .player-cls {
    font-size: 10px;
    font-weight: 700;
    text-align: center;
    padding: 2px 5px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .cls-fr  { background: #e3f2fd; color: #1565c0; }
  .cls-so  { background: #e8f5e9; color: #2e7d32; }
  .cls-jr  { background: #fff8e1; color: #f57f17; }
  .cls-sr  { background: #fce4ec; color: #ad1457; }
  .cls-def { background: #f3e5f5; color: #6a1b9a; }

  /* Stats */
  .stat {
    font-size: 12px;
    font-weight: 500;
    color: #3a5070;
    text-align: right;
  }

  /* Score */
  .score-cell {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }
  .score-val {
    font-size: 12px;
    font-weight: 700;
    color: #1a2e4a;
  }
  .score-bar-bg {
    width: 40px;
    height: 3px;
    background: #e8edf3;
    border-radius: 2px;
    overflow: hidden;
  }
  .score-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, #e8a020, #f0c040);
  }

  /* ── Footer ── */
  .widget-footer {
    padding: 11px 20px;
    background: #f5f7fa;
    border-top: 1px solid #e8edf3;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .footer-label {
    font-size: 11px;
    color: #8a9bb0;
    font-weight: 500;
  }
  .footer-link {
    font-size: 12px;
    font-weight: 600;
    color: #1a2e4a;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: color 0.15s;
  }
  .footer-link:hover { color: #e8a020; }
  .footer-link svg { width: 14px; height: 14px; }

  /* ── Mobile ── */
  @media (max-width: 560px) {
    .col-headers,
    .player-row {
      grid-template-columns: 28px 1fr 36px 52px;
    }
    .hide-mobile { display: none; }
    .player-name { font-size: 12px; }
    .score-val   { font-size: 11px; }
  }
</style>
</head>
<body>

<div class="widget">

  <div class="widget-header">
    <div class="widget-header-left">
      <span class="widget-title">Top Portal</span>
      <span class="badge-season">25 / 26</span>
      <span class="badge-portal">Portal</span>
    </div>
    <span class="badge-live">Data updated</span>
  </div>

  <div class="col-headers">
    <span>#</span>
    <span>Player</span>
    <span class="hide-mobile">Team</span>
    <span class="hide-mobile">Cls</span>
    <span>PPG</span>
    <span>Score</span>
  </div>

  <div id="players-container"></div>

  <div class="widget-footer">
    <span class="footer-label">Top Portal · Ranked by Gaussian Score</span>
    <a href="https://gaussianhoops.com/portal" class="footer-link" target="_blank">
      View all portal
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 8h10M9 4l4 4-4 4"/>
      </svg>
    </a>
  </div>

</div>

<script>
const TOP10 = [{"rank": 1, "name": "Devin Vanterpool", "team": "FAU", "cls": "So", "pos": "G", "ht": "6-4", "ppg": 15.8, "rpg": 6.3, "apg": 2.4, "score": 87.1, "role": "Impact Player", "conf": "AAC"}, {"rank": 2, "name": "Zaide Lowery", "team": "MARQ", "cls": "Jr", "pos": "SG", "ht": "6-5", "ppg": 8.1, "rpg": 2.9, "apg": 1.7, "score": 71.1, "role": "Role Player", "conf": "Big East"}, {"rank": 3, "name": "Tyler Betsey", "team": "SYRA", "cls": "So", "pos": "F", "ht": "6-8", "ppg": 6.7, "rpg": 2.8, "apg": 0.4, "score": 65.2, "role": "Role Player", "conf": "ACC"}, {"rank": 4, "name": "Kaseem Watson", "team": "UTEP", "cls": "Jr", "pos": "F", "ht": "6-9", "ppg": 12.5, "rpg": 5.0, "apg": 1.5, "score": 64.5, "role": "Role Player", "conf": "C-USA"}, {"rank": 5, "name": "Stevie Elam", "team": "UWM", "cls": "Fr", "pos": "G", "ht": "6-2", "ppg": 10.5, "rpg": 4.7, "apg": 0.8, "score": 61.0, "role": "Role Player", "conf": "Horizon"}, {"rank": 6, "name": "Omaha Biliew", "team": "WF", "cls": "Jr", "pos": "F", "ht": "6-8", "ppg": 5.9, "rpg": 2.3, "apg": 0.5, "score": 50.4, "role": "Bench", "conf": "ACC"}, {"rank": 7, "name": "George Marshall", "team": "MRHD", "cls": "Sr", "pos": "G", "ht": "6-4", "ppg": 13.8, "rpg": 4.5, "apg": 1.9, "score": 48.6, "role": "Role Player", "conf": "OVC"}, {"rank": 8, "name": "Devon Pryor", "team": "OREG", "cls": "Jr", "pos": "F", "ht": "6-7", "ppg": 2.9, "rpg": 2.5, "apg": 1.2, "score": 41.2, "role": "Bench", "conf": "B10"}, {"rank": 9, "name": "Jayden Johnson", "team": "SCSU", "cls": "So", "pos": "G", "ht": "6-1", "ppg": 13.4, "rpg": 3.0, "apg": 3.5, "score": 39.9, "role": "Role Player", "conf": "MEAC"}, {"rank": 10, "name": "Micah Simpson", "team": "ALAST", "cls": "Sr", "pos": "G", "ht": "6-2", "ppg": 13.9, "rpg": 3.8, "apg": 3.6, "score": 35.8, "role": "Role Player", "conf": "SWC"}];

function clsClass(cls) {
  if (!cls) return 'cls-def';
  const c = cls.toLowerCase();
  if (c.startsWith('fr') || c === 'rs-fr') return 'cls-fr';
  if (c.startsWith('so') || c === 'rs-so') return 'cls-so';
  if (c.startsWith('jr'))  return 'cls-jr';
  if (c.startsWith('sr'))  return 'cls-sr';
  return 'cls-def';
}

const container = document.getElementById('players-container');

TOP10.forEach(p => {
  const rankClass = p.rank <= 3 ? `rank-${p.rank}` : 'rank-other';
  const barWidth  = Math.round((p.score / 100) * 100);

  const row = document.createElement('div');
  row.className = 'player-row';
  row.innerHTML = `
    <div class="rank-num ${rankClass}">${p.rank}</div>
    <div class="player-name">${p.name}</div>
    <div class="player-team hide-mobile">${p.team}</div>
    <div class="player-cls ${clsClass(p.cls)} hide-mobile">${p.cls}</div>
    <div class="stat">${p.ppg}</div>
    <div class="score-cell">
      <span class="score-val">${p.score}</span>
      <div class="score-bar-bg"><div class="score-bar-fill" style="width:${barWidth}%"></div></div>
    </div>
  `;
  container.appendChild(row);
});
</script>

</body>
</html>
